name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: alligator_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:password@localhost:5432/alligator_db
      SECRET_KEY: "ci-secret-key-123"
      DEBUG: "False"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set Python Path for Django apps
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/django_backend" >> $GITHUB_ENV

      - name: Install Python dependencies for Django
        run: |
          python -m pip install --upgrade pip
          if [ -f django_backend/requirements.txt ]; then
            pip install -r django_backend/requirements.txt
          fi
        working-directory: .

      - name: Ensure Playwright browsers are installed
        run: npx playwright install --with-deps chromium
        if: always()
        shell: bash

      - name: Install dependencies (kpks-mvp)
        run: npm ci
        working-directory: kpks-mvp

      - name: Run API tests
        run: npm run test:api
        working-directory: kpks-mvp

      - name: Run Auth tests
        run: npm run test:auth
        working-directory: kpks-mvp

      - name: Run all Jest tests
        run: npm test
        working-directory: kpks-mvp

      - name: Playwright UI tests
        run: npm run test:e2e
        working-directory: kpks-mvp

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Django requirements
        run: python -m pip install --upgrade pip && python -m pip install -r django_backend/requirements.txt
        
      - name: Run Django migrations
        env:
          DJANGO_SETTINGS_MODULE: django_backend.django_config.settings_ci
        run: python manage.py migrate
        working-directory: django_backend

      - name: Run Django tests
        run: python manage.py test
        working-directory: django_backend

      - name: Run Flake8
        run: |
          python -m pip install flake8
          flake8 django_backend
        working-directory: .
      - name: Lint with flake8 (Python)
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
          flake8 django_backend
        working-directory: django_backend
